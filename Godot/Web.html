<!DOCTYPE html>
<html>
<head>
    <title>$GODOT_PROJECT_NAME</title>
    <meta charset="UTF-8">
    <style>
        html {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
<div>
    <button onclick="startSingleplayer()">Singleplayer</button>
    <button onclick="startMultiplayer()">Multiplayer</button>
</div>
<canvas id="clientCanvas"></canvas>
<canvas id="campaignServerCanvas" style="display: none"></canvas>
<canvas id="shardServerCanvas" style="display: none"></canvas>
<script src="$GODOT_URL"></script>
<script>
    const canvasResizePolicy = {
        doNotResize: 0,
        resizeOnStartAndWithEngineResizeFunctions: 1,
        fillPage: 2,
    };
    
    class Jsmq {
        constructor() {
            this.queues = {};
        }
        
        send(packet, receiverId) {
            if (!this.queues[receiverId]) this.queues[receiverId] = [];
            this.queues[receiverId].push(packet);
        }
        
        receive(receiverId) {
            if (!this.queues[receiverId]) return undefined;
            return this.queues[receiverId].shift();
        }
    }

    const jsmq = new Jsmq();
    const config = $GODOT_CONFIG;

    // Whether logs with L: prefix should be printed. These messages contain low level runtime information like
    // assembly loading, garbage collection. Quite noisy, so better keep them off.
    const printL = false;
    
    function print(text, func, source) {
        if (!printL && text.startsWith("L:")) return;
        
        // This error is printed due to native WebRTC plugin not working in a browser, but we don't need it there
        if (text.endsWith("No library set for this platform")) return;
        
        // This error is always printed, even in an empty project.
        if (text.endsWith("Mono: Core API hash mismatch.")) return;
        
        if (text.startsWith("Mono: Config attempting to parse:")) return;
        
        if (source) func(`${source}: ${text}`);
        else func(text);
    }
    
    function startSingleplayer() {
        const campaignServer = new Engine(config);
        const shardServer = new Engine(config);
        const client = new Engine(config);

        Promise.resolve().then(() =>
            campaignServer.startGame({
                unloadAfterInit: false,
                canvasResizePolicy: canvasResizePolicy.doNotResize,
                args: ["--campaign-server", "--singleplayer", "--shard", "00000000-0000-0000-0000-0000000005d1"],
                canvas: document.querySelector("#campaignServerCanvas"),
                onPrint: text => print(text, console.log, "Campaign server"),
                onPrintError: text => print(text, console.error, "Campaign server"),
            })
        ).then(() =>
            shardServer.startGame({
                unloadAfterInit: false,
                canvasResizePolicy: canvasResizePolicy.doNotResize,
                args: ["--server", "00000000-0000-0000-0000-0000000005d1", "--singleplayer"],
                canvas: document.querySelector("#shardServerCanvas"),
                onPrint: text => print(text, console.log, "Shard server"),
                onPrintError: text => print(text, console.error, "Shard server"),
            })
        ).then(() =>
            client.startGame({
                unloadAfterInit: true,
                canvasResizePolicy: canvasResizePolicy.fillPage,
                args: ["--singleplayer"],
                canvas: document.querySelector("#clientCanvas"),
                onPrint: text => print(text, console.log, "Client"),
                onPrintError: text => print(text, console.error, "Client"),
            })    
        );
    }

    function startMultiplayer() {
        const client = new Engine(config);
        client.startGame({
            unloadAfterInit: true,
            canvasResizePolicy: canvasResizePolicy.fillPage,
            args: [],
            canvas: document.querySelector("#clientCanvas"),
            onPrint: text => print(text, console.log),
            onPrintError: text => print(text, console.error),
        });
    }
</script>
</body>
</html>
